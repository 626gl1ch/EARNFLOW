name = "earnflow-api"
main = "src/index.js"
compatibility_date = "2025-01-01"
account_id = "" # daniellancce1 account id — fill in

kv_namespaces = [
  { binding = "FRAUD_KV", id = "dev_fraud_kv_id" } # create via `wrangler kv:namespace create FRAUD_KV` in prod
]

[triggers]
crons = ["*/15 * * * *", "0 * * * *", "0 2 * * *", "0 */6 * * *"]
# */15 * * * *  = expire stale tasks (every 15 min)
# 0 * * * *     = confirm CPA pending_confirmation → paid (every hour)
# 0 2 * * *     = daily payout batch + owner revenue sweep (2am)
# 0 */6 * * *   = fraud sweep (every 6hrs)


# Secrets (set via `wrangler secret put <NAME>`, never committed):
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   SUPABASE_ANON_KEY
#   PAYSTACK_SECRET_KEY
#   IPQS_API_KEY
#   BITLABS_API_KEY
#   CPX_RESEARCH_APP_ID
#   POSTBACK_SECRET_CPALEAD
#   POSTBACK_SECRET_ADGATEMEDIA
#   POSTBACK_SECRET_OFFERTORO
#   POSTBACK_SECRET_MYLEAD
#   POSTBACK_SECRET_BITLABS
#   POSTBACK_SECRET_CPXRESEARCH
#   POSTBACK_SECRET_THEOREMREACH
#   PAYSTACK_WEBHOOK_SECRET
#   RESEND_API_KEY


[vars]
DEBUG = "false"
