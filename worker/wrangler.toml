name = "earnflow-api"
main = "src/index.js"
compatibility_date = "2025-01-01"
account_id = "" # daniellancce1 account id — fill in

kv_namespaces = [
  { binding = "FRAUD_KV", id = "" } # create via `wrangler kv:namespace create FRAUD_KV`
]

[triggers]
crons = ["*/15 * * * *", "0 2 * * *", "0 */6 * * *"]

# Secrets (set via `wrangler secret put <NAME>`, never committed):
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
#   SUPABASE_ANON_KEY
#   PAYSTACK_SECRET_KEY
#   IPQS_API_KEY
#   BITLABS_API_KEY
#   CPX_RESEARCH_APP_ID
#   POSTBACK_SECRET_CPALEAD
#   POSTBACK_SECRET_ADGATEMEDIA
#   POSTBACK_SECRET_OFFERTORO
#   POSTBACK_SECRET_MYLEAD
#   POSTBACK_SECRET_BITLABS
#   POSTBACK_SECRET_CPXRESEARCH
#   RESEND_API_KEY

[vars]
DEBUG = "false"
